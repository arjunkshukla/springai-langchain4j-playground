services:
  ollama:
    container_name: codebase-ollama-1
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama

  pgvector:
    container_name: codebase-pgvector-1
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    volumes:
      - pgvector_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ollama_storage:
    driver: local
  pgvector_storage:
    driver: local
